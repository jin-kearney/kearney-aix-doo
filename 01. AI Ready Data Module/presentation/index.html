<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 과제 유형화 × 데이터 라이프사이클 매핑 보드</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <p class="eyebrow">Interactive Workshop Board</p>
    <h1>14개 주제 매핑 보드</h1>
    <p>y축: 데이터 라이프사이클(수집→관리→활용), x축: AI 과제 1~4유형. 주제를 드래그해 셀에 배치하고, 복제/추가도 가능합니다.</p>
  </header>

  <main>
    <section class="panel">
      <h2>주제 팔레트 (5대 Framework)</h2>
      <div class="toolbar">
        <input id="newTopicInput" type="text" placeholder="추가할 신규 주제 입력" />
        <button id="addTopicBtn" type="button">신규 주제 추가</button>
      </div>
      <div id="frameworkGroups" class="framework-groups"></div>
      <p class="hint">팁: 토픽을 더블클릭하면 복제됩니다. 셀 안 카드의 ✕ 버튼으로 삭제할 수 있습니다.</p>
    </section>

    <section class="panel">
      <h2>데이터 라이프사이클 × AI 과제 유형 매핑</h2>
      <div class="matrix-wrap">
        <table class="mapping-table">
          <thead>
            <tr>
              <th>데이터 라이프사이클 \ AI 유형</th>
              <th>1. 업무 인사이트형</th>
              <th>2. 업무 실행형</th>
              <th>3. 현장 인사이트형</th>
              <th>4. 현장 실행형</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th>수집</th>
              <td class="dropzone"></td><td class="dropzone"></td><td class="dropzone"></td><td class="dropzone"></td>
            </tr>
            <tr>
              <th>관리</th>
              <td class="dropzone"></td><td class="dropzone"></td><td class="dropzone"></td><td class="dropzone"></td>
            </tr>
            <tr>
              <th>활용</th>
              <td class="dropzone"></td><td class="dropzone"></td><td class="dropzone"></td><td class="dropzone"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

<script>
const frameworkMap = {
  Findable: ['데이터 카탈로그','메타데이터','비즈니스 글로서리'],
  Understandable: ['데이터 전처리','데이터 해설/주석','온톨로지'],
  Trustworthy: ['Observability','데이터 품질/권한관리','데이터 계통(Lineage)'],
  Governed: ['데이터 생명주기 관리','데이터 운영관리','데이터 Product화'],
  Scaleable: ['합성데이터 (Synthetic)','Physical 데이터']
};

const frameworkGroups = document.getElementById('frameworkGroups');
const addTopicBtn = document.getElementById('addTopicBtn');
const newTopicInput = document.getElementById('newTopicInput');

function createTopicChip(label, category='Custom') {
  const chip = document.createElement('button');
  chip.className = 'topic-chip';
  chip.type = 'button';
  chip.draggable = true;
  chip.textContent = label;
  chip.addEventListener('dragstart', (e) => {
    e.dataTransfer.setData('text/plain', `[${category}] ${label}`);
    e.dataTransfer.effectAllowed = 'copy';
  });
  chip.addEventListener('dblclick', () => {
    const clone = createTopicChip(label, category);
    const group = chip.closest('.framework-box')?.querySelector('.topic-list');
    (group || frameworkGroups).appendChild(clone);
  });
  return chip;
}

function createFrameworkBox(name, topics){
  const box = document.createElement('article');
  box.className = 'framework-box';

  const title = document.createElement('h3');
  title.textContent = name;

  const list = document.createElement('div');
  list.className = 'topic-list';
  topics.forEach(t => list.appendChild(createTopicChip(t, name)));

  box.appendChild(title);
  box.appendChild(list);
  return box;
}

function createPlacedCard(text){
  const card = document.createElement('div');
  card.className = 'placed-card';
  const span = document.createElement('span'); span.textContent = text;
  const btn = document.createElement('button'); btn.className='remove-btn'; btn.type='button'; btn.textContent='✕';
  btn.addEventListener('click', () => card.remove());
  card.appendChild(span); card.appendChild(btn);
  return card;
}

Object.entries(frameworkMap).forEach(([name, topics]) => {
  frameworkGroups.appendChild(createFrameworkBox(name, topics));
});

addTopicBtn.addEventListener('click', () => {
  const value = newTopicInput.value.trim();
  if (!value) return;
  const customBox = frameworkGroups.querySelector('[data-custom]') || (() => {
    const box = createFrameworkBox('Custom', []);
    box.dataset.custom = 'true';
    frameworkGroups.appendChild(box);
    return box;
  })();
  customBox.querySelector('.topic-list').appendChild(createTopicChip(value, 'Custom'));
  newTopicInput.value = '';
});

newTopicInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTopicBtn.click(); });

document.querySelectorAll('.dropzone').forEach(zone => {
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('is-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('is-over'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('is-over');
    const txt = e.dataTransfer.getData('text/plain');
    if (txt) zone.appendChild(createPlacedCard(txt));
  });
});
</script>
</body>
</html>
