<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 데이터 거버넌스 프레임워크 - 주제별 백서/Level 디자인</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <p class="eyebrow">AI Ready Data Whitepaper Design</p>
    <h1>최종 주제 × 주제별 Level 정의 프레젠테이션</h1>
    <p>주제별 Key Question과 Level 정의를 바탕으로 백서에 담아야 할 핵심 구조를 한 페이지에서 확인할 수 있도록 구성했습니다.</p>
  </header>

  <main>
    <section class="panel">
      <h2>프레임워크 개요</h2>
      <div class="pillars" id="pillars"></div>
    </section>

    <section class="panel">
      <h2>주제별 백서 구성 + Key Question 답변 방향</h2>
      <p class="hint">각 카드: <strong>백서 핵심 챕터</strong> + <strong>Key Question 답변전략</strong> + <strong>권장 Level</strong></p>
      <div id="topics" class="topics-grid"></div>
    </section>
  </main>

<script>
const data = [
  { pillar:'Findable', topic:'데이터 카탈로그', level:'L2-L4', chapters:['통합 카탈로그 아키텍처','AI 검색/연결 API·인덱스','자동 등록·동기화'], answers:['분산데이터 자동 스캔·등록','시맨틱 검색으로 자동 탐색','드리프트 감지 기반 최신성 유지'] },
  { pillar:'Findable', topic:'메타데이터', level:'L2-L4', chapters:['3계층 메타데이터 모델','AI Readable Schema','자동 추출·갱신'], answers:['의미/맥락 표준 템플릿화','LLM 이해형 설명/제약 제공','변경 감지 워크플로우 자동화'] },
  { pillar:'Findable', topic:'비즈니스 Glossary', level:'L2-L3', chapters:['용어 표준화 프로세스','Glossary-자산 연결','변경 승인 거버넌스'], answers:['부서별 용어 충돌 정렬','RAG/프롬프트 컨텍스트 연계','버전·승인 체계로 일관성 관리'] },
  { pillar:'Understandable', topic:'데이터 전처리', level:'L2-L4', chapters:['비정형 변환 전략','클렌징 규칙 라이브러리','회귀테스트·SLA'], answers:['PDF/이미지/표 구조화','결측/중복/오류 룰 기반 처리','원천변경에도 품질 안정화'] },
  { pillar:'Understandable', topic:'데이터 해설/주석', level:'L2-L4', chapters:['라벨링 가이드라인','LLM+HITL 파이프라인','IAA·Golden set'], answers:['대량 주석 효율화','해석 일관성 정량관리','자동주석 검증 범위 최적화'] },
  { pillar:'Understandable', topic:'온톨로지', level:'L3-L4', chapters:['개념·관계 모델','Knowledge Graph','진화 거버넌스'], answers:['비즈니스 지식 구조화','개념 관계 기반 이해 강화','버전관리로 지속 업데이트'] },
  { pillar:'Trustworthy', topic:'Observability', level:'L2-L4', chapters:['관측지표 체계','자동 이상탐지','RCA 플레이북'], answers:['문제 단계 즉시 탐지','무인 이상감지 자동화','데이터/모델 원인 분리'] },
  { pillar:'Trustworthy', topic:'데이터 품질/권한 관리', level:'L2-L4', chapters:['품질 규칙·측정','적격성 체크리스트','RBAC/ABAC 정책'], answers:['부적합 데이터 사전 차단','목적/역할 기반 세밀 통제','품질 대시보드 자동관리'] },
  { pillar:'Trustworthy', topic:'데이터 계통(Lineage)', level:'L2-L4', chapters:['라인리지 수준 정의','표준 기반 자동수집','감사 리포팅'], answers:['문제 원천 역추적','변환/조합 자동기록','규제 대응 즉시 증빙'] },
  { pillar:'Governed', topic:'데이터 운영관리', level:'L2-L4', chapters:['DataOps 모델','오케스트레이션','CI/CD for Data'], answers:['수집-제공 E2E 자동화','장애 복구·영향 최소화','멀티팀 협업 표준화'] },
  { pillar:'Governed', topic:'데이터 생명주기 관리', level:'L2-L4', chapters:['Retention 정책','법적 보존 매핑','자동 이관·폐기'], answers:['폐기/이관 자동 식별','보존 의무 자동 분류','저장비용 정책 통제'] },
  { pillar:'Governed', topic:'데이터 디지털화', level:'L1-L3', chapters:['대상 우선순위','OCR/VLM 파이프라인','현장 Digital-First'], answers:['수기·종이 데이터 전환','오류·누락 검증 체계화','처음부터 디지털 생성'] },
  { pillar:'Governed', topic:'데이터 보안(민감정보 마스킹)', level:'L2-L4', chapters:['민감정보 자동탐지','마스킹 기법 카탈로그','재식별 위험평가'], answers:['비정형 PII 자동 탐지','성능-프라이버시 균형','목적별 차등 마스킹'] },
  { pillar:'Evolvable', topic:'데이터 Product화', level:'L2-L4', chapters:['Data Product 캔버스','셀프서비스 플랫폼','Data Contract'], answers:['요청 없는 셀프서비스','SLA/책임자 명확화','재사용 중심 공유체계'] },
  { pillar:'Evolvable', topic:'합성데이터', level:'L3-L4', chapters:['활용 시나리오','Fidelity/Privacy 평가','편향 통제'], answers:['데이터 부족/제한 보완','실데이터 패턴 반영 검증','편향/과적합 방지'] },
  { pillar:'Evolvable', topic:'AI 평가 데이터', level:'L3-L4', chapters:['평가 차원 정의','Golden Dataset','Continuous Eval'], answers:['평가기준/정답 체계화','전문가 판단 데이터화','업데이트 시 지속 갱신'] },
  { pillar:'Evolvable', topic:'Feedback Loop', level:'L3-L4', chapters:['Telemetry 스키마','Feedback→Training','A/B 개선'], answers:['운영결과 자동수집','재학습·프롬프트 반영','주기·자동화 최적 설계'] },
  { pillar:'Actionable', topic:'Physical 데이터', level:'L2-L4', chapters:['센서/설비 인벤토리','실시간 수집 아키텍처','Stream vs Batch'], answers:['현장데이터 실시간 연계','노이즈/누락 정제','처리 방식 기준 분기'] },
  { pillar:'Actionable', topic:'API/Tool 연계 데이터', level:'L2-L4', chapters:['Tool 분류/스키마','MCP Registry','Call history 자산화'], answers:['입출력 표준화','공통 프로토콜 운영','호출 이력 데이터 자산화'] },
  { pillar:'Actionable', topic:'Prompt/Harness 자산화', level:'L2-L4', chapters:['SOP→Prompt 구조화','버전·회귀 테스트','Harness 표준화'], answers:['업무판단 프롬프트화','재사용 가능한 자산화','성능저하 탐지·개선'] }
];

const palette = {Findable:'#0c4da2',Understandable:'#1f7a46',Trustworthy:'#a45113',Governed:'#5d3da6',Evolvable:'#2f5f8f',Actionable:'#8f6a00'};

const pillars = [...new Set(data.map(d => d.pillar))];
const pillarWrap = document.getElementById('pillars');
pillars.forEach(p => {
  const el = document.createElement('div');
  el.className = 'pillar';
  el.style.borderColor = palette[p];
  el.innerHTML = `<strong>${p}</strong><span>${data.filter(d=>d.pillar===p).length}개 주제</span>`;
  pillarWrap.appendChild(el);
});

const topics = document.getElementById('topics');
data.forEach(d => {
  const card = document.createElement('article');
  card.className = 'topic-card';
  card.style.borderTop = `5px solid ${palette[d.pillar]}`;
  card.innerHTML = `
    <div class="meta"><span class="tag">${d.pillar}</span><span class="level">${d.level}</span></div>
    <h3>${d.topic}</h3>
    <h4>백서 핵심 챕터</h4>
    <ul>${d.chapters.map(v=>`<li>${v}</li>`).join('')}</ul>
    <h4>Key Question 답변 방향</h4>
    <ul>${d.answers.map(v=>`<li>${v}</li>`).join('')}</ul>
  `;
  topics.appendChild(card);
});
</script>
</body>
</html>
